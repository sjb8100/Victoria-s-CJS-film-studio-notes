# The Docker image that will be used to build your app
image: 'node:lts'

# The job MUST be named exactly "pages" for GitLab Pages to deploy properly
pages:
  # Functions that should be executed before the build script is run
  before_script:
    # Use 'npm install' instead of 'npm ci' if you don't have a package-lock.json
    - npm install

  # The required script block containing your build commands
  script:
    # Attempt to run the build script defined in your package.json
    - npm run build || echo "No build script found, skipping..."
    
    # GitLab Pages requires the files to be in a folder named "public"
    # If your files are in the root, we ensure the public folder exists and move them
    - |
      if [ ! -d "public" ]; then
        mkdir public
        cp ./*.html public/ 2>/dev/null || true
        cp ./*.js public/ 2>/dev/null || true
        cp ./*.css public/ 2>/dev/null || true
        cp -r assets public/ 2>/dev/null || true
      fi

  # This tells GitLab which folder to grab and deploy to the Pages URL
  artifacts:
    paths:
      - public

  rules:
    # This ensures that only pushes to the default branch will trigger a pages deploy
    - if: "$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH"